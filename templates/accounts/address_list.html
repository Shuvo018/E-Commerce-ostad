<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Addresses</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f8f9fa; }
        .card { border: 0; border-radius: 1rem; box-shadow: 0 0.5rem 1.5rem rgba(0,0,0,0.08); }
        .btn { border-radius: 0.75rem; }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card">
                    <div class="card-body p-4">
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <h2 class="h4 mb-0">My Addresses</h2>
                            <a href="{% url 'address_create' %}" class="btn btn-primary">Add New Address</a>
                        </div>

                        <p><a href="{% url 'profile' %}">Back to Profile</a></p>

                        {% if addresses %}
                            <div class="list-group">
                                {% for address in addresses %}
                                    <div class="list-group-item">
                                        <div class="d-flex justify-content-between align-items-start">
                                            <div>
                                                <p class="mb-1"><strong>{{ address.street }}</strong></p>
                                                <p class="mb-1 text-muted">{{ address.city }}, {{ address.postal_code }}</p>
                                                <p class="mb-0 text-muted">{{ address.country }}</p>
                                            </div>
                                            <div>
                                                <a href="{% url 'address_update' address.pk %}" class="btn btn-sm btn-outline-secondary me-2">Edit</a>
                                                <a href="{% url 'address_delete' address.pk %}" class="btn btn-sm btn-outline-danger">Delete</a>
                                            </div>
                                        </div>
                                    </div>
                                {% endfor %}
                            </div>
                        {% else %}
                            <div class="alert alert-light">No addresses added yet.</div>
                        {% endif %}
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
