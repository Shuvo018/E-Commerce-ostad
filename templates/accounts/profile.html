<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f8f9fa; }
        .card { border: 0; border-radius: 1rem; box-shadow: 0 0.5rem 1.5rem rgba(0,0,0,0.08); }
        .form-control, .form-select { border-radius: 0.75rem; }
        .btn-primary { border-radius: 0.75rem; }
        .avatar-circle {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #fff;
            box-shadow: 0 0.25rem 0.75rem rgba(0,0,0,0.15);
        }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-7">
                <div class="card">
                    <div class="card-body p-4">
                        <div class="text-center mb-4">
                            {% if user.customer_profile.first.profile_image %}
                                <img src="{{ user.customer_profile.first.profile_image.url }}" alt="Profile image" class="avatar-circle">
                            {% else %}
                                <div class="avatar-circle d-flex align-items-center justify-content-center bg-secondary text-white fs-3">
                                    {{ user.first_name|first|default:'U' }}
                                </div>
                            {% endif %}
                        </div>

                        <h2 class="h4 mb-3 text-center">Profile</h2>

                        {% if messages %}
                            {% for message in messages %}
                                <div class="alert alert-success">{{ message }}</div>
                            {% endfor %}
                        {% endif %}

                        <form method="post" enctype="multipart/form-data" class="mt-3">
                            {% csrf_token %}
                            {{ form.as_p }}
                            <button type="submit" class="btn btn-primary mt-3">Save</button>
                        </form>

                        <div class="mt-4">
                            <a href="{% url 'address_list' %}" class="btn btn-outline-secondary me-2">Manage Addresses</a>
                            <a href="{% url 'logout' %}" class="btn btn-outline-danger">Logout</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
